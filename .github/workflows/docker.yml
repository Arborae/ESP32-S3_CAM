name: Build and Publish Docker image to GHCR

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/arborae/esp32-s3_cam"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            CLEAN_TAG="${GITHUB_REF_NAME#v}"
            echo "tags=${IMAGE}:latest,${IMAGE}:${CLEAN_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:latest,${IMAGE}:main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/arborae/ESP32-S3_CAM
            org.opencontainers.image.description=ESP32-S3 CAM gesture server (MediaPipe + MQTT + Home Assistant)
            org.opencontainers.image.licenses=MIT
